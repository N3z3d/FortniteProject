  start_date: "2026-03-19"
  status: done

  # ----------------------------------------------------------
  # Phase 0 — P0 : Crashes bloquants (score 9.1 → 7.3)
  # Root cause commune: lifecycle WebSocket + store non nettoyé
  # ----------------------------------------------------------

  # P0 #1 (score 9.1): Crash/freeze total sur déconnexion
  # RC-1+RC-5: subscribe() sans unsubscribe() dans composants draft/simultaneous
  # Fix: takeUntilDestroyed() sur tous les draftEvents$/simultaneousEvents$ subscribes
  #      + store.reset() dans AppComponent au logout
  #      + disconnectStomp() explicite dans ngOnDestroy()
  #      + error handler sur les Subjects STOMP (catchError → empty())
  # Scope: SnakeDraftPageComponent, SimultaneousDraftPageComponent, WebSocketService
  # AC: déconnexion depuis page draft → redirect login sans freeze ni erreur console
  sprint12-ws-lifecycle-fix: done

  # P0 #2 (score 8.6): Delete/Archive game → server error 500
  # RC-2: DataIntegrityViolationException → 500 non catchée
  # Fix: DomainExceptionHandler + handler DataIntegrityViolationException → 409 CONFLICT
  #      + ordre de suppression: picks → participants → draft → game (cascade)
  #      + archive = soft delete (deletedAt) uniquement, jamais hard delete
  #      + validation statut avant archive ("draft en cours → refusé avec message clair")
  #      + message d'erreur frontend lisible (pas "error server")
  # AC: delete partie sans picks → OK ; delete partie avec picks → 409 message clair ;
  #     archive partie CREATING → OK ; archive partie DRAFT_IN_PROGRESS → message bloquant
  sprint12-delete-archive-fix: done

  # P0 #3 (score 8.1): Draft timer désynchronisé / "Connection instable"
  # RC-3: Timer local client repart à 0 à chaque reconnexion STOMP
  # ADR-001: Backend inclut expiresAt: Instant dans chaque PICK_PROMPT event STOMP
  # Fix backend: ajouter expiresAt dans DraftEventMessage + le remplir dans l'orchestrateur
  # Fix frontend: supprimer countdown local dans DraftTimerComponent
  #               afficher max(0, expiresAt - now()) en temps réel
  #               reconnect STOMP → relire expiresAt → timer correct immédiatement
  # AC: fermer/rouvrir l'onglet pendant draft → timer affiche le vrai temps restant serveur
  sprint12-draft-timer-server-sync: done

  # P0 #4 (score 7.3): Parties de Teddy vides au chargement initial
  # RC-4: games.length === 0 affiché avant que la requête HTTP soit résolue
  # Fix: ajouter isLoading signal dans UserGamesStore
  #      état tripartite dans template: loading (spinner) | empty (vrai vide) | populated
  #      + store.reset() au logout pour isoler les sessions
  # AC: login Teddy → spinner visible → puis liste correcte ; jamais "aucune partie" si en cours de chargement
  sprint12-loading-states-fix: done

  # ----------------------------------------------------------
  # Phase 1 — P1 : UX + Error handling (score 7.7 → 5.5)
  # ----------------------------------------------------------

  # P1 #1 (score 7.7): Écran d'erreur générique sans récupération
