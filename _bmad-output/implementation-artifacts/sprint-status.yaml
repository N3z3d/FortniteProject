#               ADR × 3, Occam's Razor, First Principles, Devil's Advocate,
#               Self-Consistency Validation)
#
# Root causes identifiées:
#   RC-1: subscribe() sans unsubscribe() → freeze sur disconnect
#   RC-2: DataIntegrityViolationException non catchée → 500 delete/archive
#   RC-3: Timer local client ignorant expiresAt serveur → désync draft
#   RC-4: games.length === 0 avant load terminé → "aucune partie" erroné
