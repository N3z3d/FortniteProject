# CI — Fortnite Pronos
# Pipeline principal : lint → tests → build backend + frontend → validation Docker
#
# Déclenché sur :
#   - push toutes branches (détection de régression immédiate)
#   - pull_request vers main (gate de merge)
#
# Pre-existing backend failures connues (~15 tests) :
#   GameDataIntegrationTest, FortniteTrackerServiceTddTest, PlayerServiceTddTest,
#   ScoreCalculationServiceTddTest, ScoreServiceTddTest, GameStatisticsServiceTddTest
#   → Exclus via pom.xml <excludes> dans maven-surefire-plugin.
#   Ces tests sont des RED TDD (intégration data ou API externe non mockée) et
#   ne représentent pas de régressions introduites.

name: CI — Fortnite Pronos

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Job 1 — Backend (Java 21 + Maven)
  # Étapes : Spotless lint → tests → build → upload JAR
  # ============================================================
  backend:
    name: Backend (Java 21 + Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 21 (Temurin) avec cache Maven
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Cache automatique de ~/.m2/repository basé sur pom.xml
          cache: 'maven'

      - name: Spotless — vérification du formatage
        run: mvn spotless:check -B --no-transfer-progress

      # mvn verify : compile → test → package → verify
      # Les exclusions pre-existing RED TDD sont dans pom.xml <excludes>.
      - name: Tests + Build Maven
        run: mvn verify -B --no-transfer-progress

      - name: Upload JAR (artifact de build)
        uses: actions/upload-artifact@v4
        # Toujours uploader même si les tests échouent partiellement
        if: always()
        with:
          name: backend-jar
          path: target/*.jar
          # Conserver 7 jours — suffisant pour une post-review rapide
          retention-days: 7

  # ============================================================
  # Job 2 — Frontend (Node 20 + Angular)
  # Étapes : install → lint → build → upload dist
  # ============================================================
  frontend:
    name: Frontend (Node 20 + Angular)
    runs-on: ubuntu-latest

    # Tous les steps frontend s'exécutent dans le sous-dossier frontend/
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 22 avec cache npm
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Cache basé sur frontend/package-lock.json — accélère les runs suivants
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (npm ci)
        run: npm ci --silent

      # Le projet n'a pas de target lint Angular configuree. Ce check reste
      # explicite pour eviter un faux vert via "ng lint || true".
      - name: Lint Angular configuration
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const config = JSON.parse(fs.readFileSync('angular.json', 'utf8'));
          const projects = Object.values(config.projects ?? {});
          const hasLintTarget = projects.some((project) => Boolean(
            project?.architect?.lint ?? project?.targets?.lint
          ));

          if (hasLintTarget) {
            console.error('Angular lint target detected; wire it explicitly in CI instead of skipping it.');
            process.exit(1);
          }

          console.log('No Angular lint target configured; Vitest and production build remain the frontend gates.');
          NODE

      # Tests Vitest (unitaires) — exécutés explicitement en CI.
      # Le step est bloquant : un test rouge frontend doit faire echouer le job.
      - name: Tests Vitest (unitaires)
        id: vitest
        shell: bash
        run: |
          set -o pipefail
          npm run test:vitest 2>&1 | tee vitest-ci.log

      - name: Upload Vitest log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-vitest-log
          path: frontend/vitest-ci.log
          retention-days: 7

      - name: CI Summary — Vitest baseline
        if: always()
        shell: bash
        run: |
          vitest_outcome="${{ steps.vitest.outcome }}"

          if [ "$vitest_outcome" = "success" ]; then
            {
              echo "## Frontend Vitest"
              echo ""
              echo "- Result: passed"
            } >> "$GITHUB_STEP_SUMMARY"
          elif [ "$vitest_outcome" = "failure" ]; then
            {
              echo "## Frontend Vitest"
              echo ""
              echo "- Result: failure"
              echo "- Artifact: frontend-vitest-log"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Frontend Vitest"
              echo ""
              echo "- Result: not run"
              echo "- Outcome: ${vitest_outcome}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build Angular (production)
        run: npm run build

      - name: Upload dist Angular (artifact de build)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ============================================================
  # Job 3 — Docker build + push GHCR (main uniquement)
  # Build l'image multi-stage et push sur GitHub Container Registry.
  # Dépend de backend ET frontend pour garantir que les builds
  # individuels sont verts avant de construire l'image complète.
  # Tag: latest + SHA court pour rollback facile.
  # ============================================================
  docker-build-and-push:
    name: Docker build + push GHCR
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Ne tourne que sur la branche main
    if: github.ref == 'refs/heads/main'

    # Permissions requises pour pousser sur GHCR via GITHUB_TOKEN
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Normalize GHCR image name
        shell: bash
        run: echo "IMAGE_NAME=$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build et push image Docker vers GHCR
        # --target production : stage final multi-stage uniquement
        # Tags: :latest (déploiement courant) + :sha (rollback précis)
        run: |
          docker build --target production \
            -t "${IMAGE_NAME}:latest" \
            -t "${IMAGE_NAME}:${{ github.sha }}" \
            .
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${{ github.sha }}"

      - name: Staging deploy summary (guarded skip)
        shell: bash
        run: |
          {
            echo "## Staging deploy"
            echo ""
            echo "- Result: skipped"
            echo "- Reason: hosting decision absent; no GitHub Environment/secrets are declared in this repository."
            echo "- Image published: ${IMAGE_NAME}:${{ github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
