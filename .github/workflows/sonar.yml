name: SonarQube

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sonar-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  validate-secrets:
    name: Validate Sonar Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          if [ -z "${SONAR_HOST_URL}" ]; then
            echo "Missing secret: SONAR_HOST_URL" >&2
            exit 1
          fi
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "Missing secret: SONAR_TOKEN" >&2
            exit 1
          fi

  backend:
    name: Sonar Backend
    runs-on: ubuntu-latest
    needs: validate-secrets
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Sonar scan (backend)
        run: >
          mvn -B -DskipTests
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
          -Dsonar.host.url=${SONAR_HOST_URL}
          -Dsonar.token=${SONAR_TOKEN}
          -Dsonar.projectKey=fortnite-pronos-backend
          -Dsonar.projectName="Fortnite Pronos Backend"
          -Dsonar.qualitygate.wait=true
          -Dsonar.qualitygate.timeout=600

  frontend:
    name: Sonar Frontend
    runs-on: ubuntu-latest
    needs: validate-secrets
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Normalize lcov path
        run: |
          sed -i 's#^SF:frontend/#SF:#g' coverage/frontend/lcov.info

      - name: Sonar scan (frontend)
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
            -Dsonar.token=${{ env.SONAR_TOKEN }}
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=600
