# Base datasource configuration is centralized in profile-specific YAML files.
spring.jpa.hibernate.ddl-auto=none

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Data initialization disabled to avoid conflicts
spring.sql.init.mode=never

# JPA
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.com.fortnite.pronos=DEBUG

# Email Alerts (disabled by default — set alert.email.enabled=true + spring.mail.* to activate)
# When disabled, EmailAlertService and UnresolvedPlayerAlertScheduler beans are NOT created.
alert.email.enabled=false
alert.email.to=${ALERT_EMAIL_TO:admin@example.com}
alert.email.from=${ALERT_EMAIL_FROM:noreply@fortnite-pronos.local}
alert.unresolved.threshold-hours=24
alert.unresolved.cron=0 0 6 * * *
# spring.mail.host=${SMTP_HOST:smtp.gmail.com}
# spring.mail.port=${SMTP_PORT:587}
# spring.mail.username=${SMTP_USERNAME:}
# spring.mail.password=${SMTP_PASSWORD:}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# Scraping — FortniteTracker proxy adapter
# Keys are loaded from env vars (never commit real keys):
#   SCRAPING_FORTNITETRACKER_SCRAPFLY_KEYS=key1,key2
#   SCRAPING_FORTNITETRACKER_SCRAPERAPI_KEYS=key1,key2
#   SCRAPING_FORTNITETRACKER_SCRAPEDO_TOKEN=token1,token2
# Dry-run tip: set scraping.fortnitetracker.pages-per-region=1 for single-page validation
# (default is 4 pages per region for full scheduled ingestion)
scraping.fortnitetracker.pages-per-region=${SCRAPING_FORTNITETRACKER_PAGES_PER_REGION:4}
