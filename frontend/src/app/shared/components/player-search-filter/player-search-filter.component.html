<div class="filter-wrapper">

  <!-- Search input -->
  <mat-form-field class="search-field" appearance="outline">
    <mat-label>Rechercher un joueur</mat-label>
    <input matInput [formControl]="searchControl" autocomplete="off">
    <mat-icon matSuffix aria-hidden="true">search</mat-icon>
  </mat-form-field>

  <!-- Region filter -->
  <mat-form-field class="filter-field" appearance="outline">
    <mat-label>Région</mat-label>
    <mat-select
      [formControl]="regionControl"
      [attr.aria-disabled]="regionLocked ? 'true' : null"
      data-testid="region-select"
      (selectionChange)="onRegionChange()"
    >
      <mat-option [value]="null">Toutes</mat-option>
      <mat-option *ngFor="let r of availableRegions" [value]="r">{{ r }}</mat-option>
    </mat-select>
    <mat-hint *ngIf="regionLocked" class="lock-hint">Verrouillé (slot {{ currentRegion }})</mat-hint>
  </mat-form-field>

  <!-- Tranche filter -->
  <mat-form-field class="filter-field" appearance="outline">
    <mat-label>Niveau</mat-label>
    <mat-select
      [formControl]="trancheControl"
      [attr.aria-disabled]="trancheLocked ? 'true' : null"
      data-testid="tranche-select"
      (selectionChange)="onTrancheChange()"
    >
      <mat-option [value]="null">Tous</mat-option>
      <mat-option *ngFor="let t of availableTranches" [value]="t">{{ t }}</mat-option>
    </mat-select>
    <mat-hint *ngIf="trancheLocked" class="lock-hint">Verrouillé (slot {{ currentTranche }})</mat-hint>
  </mat-form-field>

  <!-- Toggles (draft mode defaults ON) -->
  <div class="filter-toggles">
    <mat-checkbox
      [checked]="hideUnavailable"
      (change)="onToggleChange('hideUnavailable', $event.checked)"
    >
      Libre dans ma partie
    </mat-checkbox>
    <mat-checkbox
      [checked]="hideTaken"
      (change)="onToggleChange('hideTaken', $event.checked)"
    >
      Masquer pris
    </mat-checkbox>
  </div>

  <!-- Result counter — aria-live polite, never assertive -->
  <span
    class="result-counter"
    role="status"
    aria-live="polite"
    aria-atomic="true"
  >{{ totalResults }} joueur{{ totalResults !== 1 ? 's' : '' }}</span>

</div>
