<div class="snake-draft-page">

  <!-- Skip link (screen readers) -->
  <a class="skip-link" href="#player-list">Passer à la liste accessible (50 items)</a>

  <!-- Sticky timer zone -->
  <div class="timer-zone">

    <!-- Single WS disconnect/reconnection banner (non-alarming) -->
    <div *ngIf="!wsConnected" class="ws-banner" role="status" aria-live="polite">
      <mat-icon aria-hidden="true">wifi_off</mat-icon>
      Reconnexion en cours...
    </div>

    <div class="timer-zone__inner">
      <app-snake-order-bar
        [participants]="participants"
        [currentIndex]="currentIndex"
        [regionLabel]="currentRegion !== 'GLOBAL' ? currentRegion : undefined"
      ></app-snake-order-bar>

      <app-draft-timer
        *ngIf="draft"
        [durationSeconds]="draft.rules?.timePerPick ?? 60"
        [serverExpiresAt]="pickExpiresAt"
        [autoPickPlayer]="isMyTurn ? (recommendedPlayer?.username ?? null) : null"
        (expired)="onTimerExpired()"
        (cancelled)="onPickCancelled()"
      ></app-draft-timer>
    </div>
  </div>

  <!-- Draft content - @if(phase !== 'idle') keeps component mounted during turn transitions (BUG-01) -->
  @if (phase !== 'idle') {
    <div class="draft-content">

      <!-- TON TOUR badge -->
      <div *ngIf="isMyTurn" class="my-turn-badge" role="status" aria-live="polite" aria-atomic="true">
        🟢 TON TOUR
      </div>

      <!-- Tranche info bar -->
      <div *ngIf="tranchesEnabled && trancheFloor > 1" class="tranche-info-bar">
        <span class="tranche-label">Tranche : joueurs rank {{ trancheFloor }}+ uniquement</span>
        <button mat-stroked-button class="btn-toggle-ineligible" (click)="toggleHideIneligible()">
          {{ hideIneligible ? 'Afficher tous' : 'Masquer inéligibles' }}
        </button>
      </div>

      <!-- Current region indicator (determined by draft cursor, not user choice) -->
      <div *ngIf="currentRegion && currentRegion !== 'GLOBAL'" class="current-region-label" role="status">
        Région : {{ currentRegion }}
      </div>

      <div *ngIf="regions.length > 1" class="region-switcher" role="tablist" aria-label="Régions du draft">
        <button
          *ngFor="let region of regions"
          mat-stroked-button
          type="button"
          class="region-chip"
          [class.region-chip--active]="region === currentRegion"
          [disabled]="isPickPending"
          [attr.aria-pressed]="region === currentRegion"
          (click)="onRegionSelect(region)"
        >
          {{ region }}
        </button>
      </div>

      <!-- Recommend CTA -->
      <div *ngIf="isMyTurn && recommendedPlayer" class="recommend-bar">
        <button
          mat-stroked-button
          class="btn-recommend"
          (click)="onPlayerSelect(recommendedPlayer!)"
          [attr.aria-label]="'Recommander ' + recommendedPlayer.username"
        >
          ⭐ Recommander {{ recommendedPlayer.username }}
          <span class="recommend-hint">Meilleur joueur disponible</span>
        </button>
      </div>

      <!-- Search + filter -->
      <app-player-search-filter
        mode="draft"
        [availableRegions]="regions"
        [currentRegion]="currentRegion !== 'GLOBAL' ? currentRegion : null"
        [availableTranches]="[]"
        [totalResults]="filteredPlayers.length"
        (filterChanged)="onFilterChange($event)"
      ></app-player-search-filter>

      <!-- Virtual scroll player list -->
      <cdk-virtual-scroll-viewport
        id="player-list"
        class="player-list"
        [itemSize]="48"
        aria-label="Liste des joueurs disponibles"
      >
        <app-player-card
          *cdkVirtualFor="let player of filteredPlayers"
          [player]="player"
          mode="draft"
          [selected]="selectedPlayer?.id === player.id"
          [taken]="player.selected === true"
          [recommended]="recommendedPlayer?.id === player.id"
          [class.ineligible-tranche]="!isPlayerEligible(player)"
          (cardSelected)="isPlayerEligible(player) ? onPlayerSelect($event) : null"
        ></app-player-card>
      </cdk-virtual-scroll-viewport>

      <!-- Confirm pick zone -->
      <div *ngIf="isMyTurn && selectedPlayer" class="confirm-zone">
        <button
          mat-flat-button
          class="btn-confirm"
          [disabled]="isPickPending"
          (click)="confirmPick()"
        >
          Confirmer {{ selectedPlayer.username }}
        </button>
      </div>

    </div>
  }
</div>
