<h2 mat-dialog-title>Corriger la fiche joueur</h2>

<mat-dialog-content>
  <p class="dialog-subtitle">
    {{ data.entry.playerUsername }} — {{ data.entry.playerRegion }}
  </p>

  <form [formGroup]="form" class="correct-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nouveau pseudo (optionnel)</mat-label>
      <input
        matInput
        formControlName="newUsername"
        placeholder="Laisser vide pour ne pas modifier" />
      <mat-error *ngIf="form.get('newUsername')?.hasError('maxlength')">
        50 caractères maximum
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nouvelle région (optionnel)</mat-label>
      <mat-select formControlName="newRegion">
        <mat-option [value]="null">— Inchangée —</mat-option>
        @for (region of availableRegions(); track region) {
          <mat-option [value]="region">{{ region }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Annuler</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid" (click)="submit()">
    Enregistrer
  </button>
</mat-dialog-actions>
